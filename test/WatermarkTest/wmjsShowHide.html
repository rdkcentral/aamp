<html>
<script src="/getAndCallback.js"></script>
<script>
var AssetUrl = "https://cpetestutility.stb.r53.xcal.tv/VideoTestStream/main.mpd";
var AAMPInstance = new AAMPMediaPlayer();
var PMInstance = new PersistentWatermark();


function showSuccessCB() {
    console.log("ShowSuccess!!!")
    setTimeout(() => {
                console.log("hide")
                PMInstance.Hide()
             }, 1000);
}
PMInstance.addEventListener("ShowSuccess", showSuccessCB)

function HideSuccessCB() {
    console.log("HideSuccess!!!")
    setTimeout(() => {
            console.log("show")
            PMInstance.Show()
             }, 1000);
}
PMInstance.addEventListener("HideSuccess", HideSuccessCB)

function ShowFailedCB() {
    console.log("ShowFailed!!!")
}
PMInstance.addEventListener("ShowFailed", ShowFailedCB)


function HideFailedCB() {
    console.log("HideFailed!!!")
}
PMInstance.addEventListener("HideFailed", HideFailedCB)


function updateAndShow(imageData, metadata)
{
    PMInstance.Update(imageData, metadata)
    PMInstance.Show()
}

window.onload = function() {
    AAMPInstance.load(AssetUrl);

    setTimeout(() => {
        getAndCallback("/wmimage_1.png", "", updateAndShow)
    }, 1000);
}
</script>


<body>
    <div id="videoContainer">
        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
        <source src="dummy.mp4" type=”video/ave”> <!-- hole punching -->
        </video>
    </div>

</body>
</html>
