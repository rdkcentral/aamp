const initConfig = {
    // enable AAMP info logging, and turn on Gstreamer pipeline debug
    info: true,
    gst: true,

    configRuntimeDRM: false
};

async function TST_2009_UVE_ConfigurePreferredDRM(aamp_player, drm_stream) {

    TST_STEP("Configure " + drm_stream.name + " Playback");

    // Set DRM preferred configuration
    const DrmConfig = {
        'preferredKeysystem':drm_stream.preferredKeysystem
    };
    await aamp_player.player.setDRMConfig(DrmConfig);
}

async function TST_2009_UVE_Play(aamp_player, drm_stream) {

    function listener(event) {
        console.log("AAMP_EVENT_CONTENT_PROTECTION_DATA_UPDATE: " + JSON.stringify(event));

        var DynamicDrmConfig;

        // Configure the DRM Data for license request for every KeyID reported to application
        if (drm_stream.preferredKeysystem == "com.widevine.alpha") {
            DynamicDrmConfig = {
                'keyID': event.keyID,
                "com.widevine.alpha": drm_stream.licenseServer,
                "com.microsoft.playready": "",
                'customData': '',
                'authToken': '',
                'licenseResponse': ''
            };
        }
        else {
            DynamicDrmConfig = {
                'keyID': event.keyID,
                "com.widevine.alpha": "",
                "com.microsoft.playready": drm_stream.licenseServer,
                'customData': '',
                'authToken': '',
                'licenseResponse': ''
            };
        }
        aamp_player.player.setContentProtectionDataConfig(DynamicDrmConfig);
        console.log("setContentProtectionDataConfig: " + JSON.stringify(DynamicDrmConfig));
    }

    await aamp_player.player.addEventListener("contentProtectionDataUpdate", listener);

    if (drm_stream.customHeader) {
        await aamp_player.player.addCustomHTTPHeader(drm_stream.customHeader, drm_stream.customHeaderValue, true);
    }

    // Load the DRM URL, but don't start the playback
    TST_STEP("Tune to " + drm_stream.name);
    await aamp_player.Load(drm_stream.url, false, true);

    // Start the playback and verify it plays for 10s
    TST_STEP("Start " + drm_stream.name + " Playback");
    await aamp_player.SetRate(1, false);
    await aamp_player.VerifyPlayback(10, 1);

    // Seek to middle of content and verify it plays for 10s
    const seek = parseInt(await aamp_player.TST_GetDurationSec() / 2, 10);
    TST_STEP("Seek to Position (" + seek + "s)");
    await aamp_player.Seek(seek);
    await aamp_player.VerifyPlayback(10, 1);

    // Stop the playback & cleanup
    TST_STEP("Stop " + drm_stream.name + " Playback");
    await aamp_player.Stop();

    await aamp_player.player.removeEventListener("contentProtectionDataUpdate", listener);

    if (drm_stream.customHeader) {
        await aamp_player.player.removeCustomHTTPHeader();
    }
}

async function TST_2009_UVE_AampDRMPlayback() {
    TST_START("TST_2009_UVE_AampDRMPlayback");
    var aamp_player = new AAMPPlayer("MAIN-PLAYER");
    aamp_player.player.initConfig(initConfig);

    // Enable DRM Protection event to application for setting Key ID specific setting (for key rotation)
    await aamp_player.player.configRuntimeDRM(true);

    // Configure the Content Protection Data Update timeout (App must call setContentProtectionDataConfig within this time)
    await aamp_player.player.setContentProtectionDataUpdateTimeout(5);

    for (var i = 0; i < drmStreams.length; i++) {
        await TST_2009_UVE_ConfigurePreferredDRM(aamp_player, drmStreams[i]);
        await TST_2009_UVE_Play(aamp_player, drmStreams[i]);
    }

    // Destroy the AAMP Player
    aamp_player.destroy();
    TST_END()
}
