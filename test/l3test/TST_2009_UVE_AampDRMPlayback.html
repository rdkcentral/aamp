<html>
<head>
    <meta charset="utf-8">
    <title>TST_2009_UVE_AampDRMPlayback</title>
    <link rel="stylesheet" href="TST_UVE_style.css">
    <script type="text/javascript" src="TST_UVE_utils.js" ></script>
</head>
<script>

// ------------------------------------------------------------------------------------
// Playback of DRM encoded content
// ------------------------------------------------------------------------------------
// Performs playback of DRM encoded content ensuring the correct UVE APIs are called
// to correctly configure for DRM playback and provide the key.
// The Following DRM APIs are specifically verified in this test:
//  - configRuntimeDRM
//  - setDRMConfig
//  - setContentProtectionDataUpdateTimeout
//  - setContentProtectionDataConfig
// * Events
//  - contentProtectionDataUpdate
// ------------------------------------------------------------------------------------

var DRM_url ="https://storage.googleapis.com/shaka-demo-assets/angel-one-widevine-hls/hls.m3u8"

var initConfig = {
    // enable AAMP info logging, and turn on Gstreamer pipeline debug
    info: true,
    gst: true,

    configRuntimeDRM: false
};

async function TST_2009_UVE_AampDRMPlayback() {
    TST_START("TST_2009_UVE_AampDRMPlayback");
    var aamp_player = new AAMPPlayer("MAIN-PLAYER");
    aamp_player.player.initConfig(initConfig);


    TST_STEP("Setup and Configure DRM playback");

    // Enable DRM Protection event to application for setting Key ID specific setting (for key rotation)
    await aamp_player.player.configRuntimeDRM(true);

    // Set DRM configuration for widevine DRM
    var DrmConfig = {
        'preferredKeysystem':'com.widevine.alpha',
        'com.widevine.alpha':'https://cwip-shaka-proxy.appspot.com/no_auth'
    };
    console.log("setDRMConfig: " + JSON.stringify(DrmConfig));
    await aamp_player.player.setDRMConfig(DrmConfig);

    // Configure the Content Protection Data Update timeout (App must call setContentProtectionDataConfig within this time)
    await aamp_player.player.setContentProtectionDataUpdateTimeout(20);


    // Load the DRM URL, but don't start the playback
    TST_STEP("Tune to URL");
    await aamp_player.Load(DRM_url, false, true);


    // Wait for the content protection data update containing the KEY_ID for this key rotation
    drm_update = await aamp_player.waitForEventWithTimeout(aamp_player.player, 'contentProtectionDataUpdate', aamp_timeout, null).catch(e => { TST_ASSERT_FAIL_FATAL(e) });
    console.log("contentProtectionDataUpdate: Received Key:" + JSON.stringify(drm_update.keyID));

    // Configure the DRM Data for license request for every KeyID reported to application
    TST_STEP("SetContentProtectionDataConfig");
    var DynamicDrmConfig = {
        'keyID': drm_update.keyID,
        'com.widevine.alpha': 'https://cwip-shaka-proxy.appspot.com/no_auth',
        'customData': '',
        'authToken': '',
        'licenseResponse': ''
    };
    console.log("setContentProtectionDataConfig: " + JSON.stringify(DynamicDrmConfig));
    await aamp_player.player.setContentProtectionDataConfig(DynamicDrmConfig);


    // Start the playback and verify it plays for 10s
    TST_STEP("Start Playback");
    await aamp_player.SetRate(1, false);
    await aamp_player.VerifyPlayback(10, 1);


    // DRM specific playback is now ongoing, verify some auxiliary APIs using this stream
    // ---------------------------------------------------------------------------------


    // Subscribe to specific tags / metadata in manifest
    TST_STEP("TST_SetSubscribedTags");
    let tags = ["#EXT-X-TARGETDURATION","#EXT-X-MAP", "#EXT-X-DISCONTINUITY","#EXT-X-KEY"];
    await aamp_player.TST_SetSubscribedTags(tags);
    await aamp_player.VerifyPlayback(10, 1);

    // sets the auxiliary language
    TST_STEP("setAuxiliaryLanguage");
    await aamp_player.player.setAuxiliaryLanguage("it");
    await aamp_player.VerifyPlayback(5,1);

    // get available video bitrates
    TST_STEP("getVideoBitrates");
    await aamp_player.TST_GetVideoBitrates();

    // sets the video bitrate
    TST_STEP("setVideoBitrate");
    await aamp_player.TST_SetVideoBitrate(6099164);
    await aamp_player.VerifyPlayback(4,1);

    // gets the current video bitrate
    TST_STEP("getVideoBitrate");
    var curr_bitrate = await aamp_player.TST_GetCurrentVideoBitrate();
    console.log("current_bitrate " + curr_bitrate);

    // sets the preferred audio codec
    TST_STEP("setPreferredAudioCodec");
    await aamp_player.player.setPreferredAudioCodec("mp4a.40.2");

    // Subscribe http response headers from manifest download
    TST_STEP("subscribeResponseHeaders");
    let headers = ["X-Powered-By","X-MoneyTrace"];
    await aamp_player.TST_SubscribeResponseHeaders(headers);
    await aamp_player.VerifyPlayback(2,1);

    // Stop the playback and destroy the AAMP Player
    TST_STEP("Stop the playback");
    await aamp_player.Stop();
    aamp_player.destroy();
    TST_END()
}


// Run the test when the page loads
    window.onload = function() {
    TST_2009_UVE_AampDRMPlayback()
}


</script>
<body>
    <div id="videoContainer">
        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
            <source src="dummy.mp4" type=video/ave> <!-- hole punching -->
        </video>
    </div>
    <div id="testModal">
        <p id="testData"></p>
    </div>
    <div id="infoModal">
        <p id="infoData"></p>
    </div>
</body>
</html>
