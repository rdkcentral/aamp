<html>
<head>
    <meta charset="utf-8">
    <title>TST_2001_UVE_AampMainAndAdPlayback</title>
    <link rel="stylesheet" href="TST_UVE_style.css">
    <script src="TST_UVE_utils.js"></script>
</head>
<script>

// ------------------------------------------------------------------------------------
// Playback of Main AAMP stream, switch to advert, switch back to main.
// ------------------------------------------------------------------------------------
// Performs playback of a stream, schedule an advert switch after 20s, verify the
// advert is playing before switching back to the main content.
// ------------------------------------------------------------------------------------

async function TST_2001_UVE_AampMainAndAdPlayback() {
    TST_START("TST_2001_UVE_AampMainAndAdPlayback");
    var aamp_player = new AAMPPlayer("MAIN-PLAYER");
    var aamp_ad_player = new AAMPPlayer("AD-PLAYER");


    // Load and Play the main content URL, wait 10s and verify position updated
    TST_INFO("Tune to URL - Wait: 10(s)");
    await aamp_player.Load(mainContentUrl);
    await aamp_player.VerifyPlayback(10, 1);


    // PreLoad the AD, and set the Main content to Pause at 20s
    TST_INFO("Pre-Load AD - Pause Main at: 20(s)");
    await aamp_ad_player.Load(adUrl, false);
    await aamp_player.VerifyPlayback(7, 1);
    await aamp_player.Pause(20);


    // When the Pause occurs, Detach the Main, and Play the AD for 15s
    TST_INFO("Switch to Ad - Wait: 15(s)");
    aamp_player.player.detach(); // Send main player to background
    await aamp_ad_player.Play(); // Play Ad
    await aamp_ad_player.VerifyPlayback(15, 1);


    // Now switch back the the main content for a further 10s
    TST_INFO("Switch back to Main - Wait 10(s)");
    aamp_ad_player.player.detach();
    await aamp_player.SetRate(1);
    await aamp_player.VerifyPlayback(10, 1);


    // Stop the playback and destroy the Main and Ad AAMP Players
    TST_INFO("Stop the playback");
    await aamp_player.Stop();
    await aamp_ad_player.Stop();
    aamp_player.destroy();
    aamp_ad_player.destroy();

    TST_END()
}


// Run the test when the page loads
window.onload = function() {
    TST_2001_UVE_AampMainAndAdPlayback()
}


</script>
<body>

        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
            <source src="dummy.mp4" type=video/ave> <!-- hole punching -->
        </video>
        <video id="dummyVideo" autoplay="autoplay" style="position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;">
            <source src="rec://srv/cur" type="video/x-dvb"/>
        </video>
    </div>
    <div id="testModal">
        <p id="testData"></p>
    </div>
    <div id="infoModal">
        <p id="infoData"></p>
    </div>
</body>
</html>
