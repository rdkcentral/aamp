<html>
<head>
    <meta charset="utf-8">
    <title>TST_2003_UVE_API_Subtitles</title>
    <link rel="stylesheet" href="TST_UVE_style.css">
    <script src="TST_UVE_utils.js"></script>
</head>
<script>

// ------------------------------------------------------------------------------------
// Calls and verifies the UVE subtitle and language related APIs.
// ------------------------------------------------------------------------------------
// Playback of a stream is started, and UVE APIs are called to add and remove subtitles
// in different languages, and to change the properties of the subtitle display.
// Verification is done by monitoring for the relevant events from AAMP.
// The Following APIs are specifically verified in this test:
//  - setClosedCaptionStatus
//  - getAvailableTextTracks
//  - setTextTrack
//  - getTextTrack
//  - getTextTrackInfo
//  - setTextStyleOptions
//  - getTextStyleOptions
//  - setPreferredTextLanguage
//  - getPreferredTextProperties
// * Events
//  - textTracksChanged
// ------------------------------------------------------------------------------------

const subtitleUrl = "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
const expectSubtitleLanguages = [ "de", "en", "es", "fr" ];
const positionStart = 103;
const penSizeOptions = ["auto", "small", "standard", "large", "extra_large"];

var initConfig = {
    // enable AAMP info logging, and turn on Gstreamer pipeline debug
    info: true,
    gst: true,

    // Start at position 103 logging
    offset: positionStart,
};

async function TST_2003_UVE_API_Subtitles() {
    TST_START("TST_2003_UVE_API_Subtitles");
    var aamp_player = new AAMPPlayer("UVE-AAMP-PLAYER");
    aamp_player.player.initConfig(initConfig);

    // Load the URL, seek to start position (where subtitles are displayed) but don't start playback yet.
    TST_STEP("Load the URL: " + subtitleUrl);
    await aamp_player.Load(subtitleUrl, false);
    aamp_player.player.setClosedCaptionStatus(true);

    // Get the list of available subtitle Text Tracks
    let tracks_str = aamp_player.player.getAvailableTextTracks();

    // Parse the JSON and Verify the Track Information matches what is expected for this stream
    subtitles_received_str = "";
    tracksJson = JSON.parse(tracks_str);
    TST_ASSERT ((tracksJson.length == expectSubtitleLanguages.length), ("Unexpected Number of Text Tracks - Got: " + tracksJson.length + ", Expected: " + expectSubtitleLanguages.length));
    for (var trackId = 0; trackId < tracksJson.length; trackId++ )
    {
        TST_ASSERT ((tracksJson[trackId].language == expectSubtitleLanguages[trackId]), ("Unexpected Track Language - Got: " + tracksJson[trackId].language + ", Expected: " + expectSubtitleLanguages[trackId]));
        subtitles_received_str += "<br> " + trackId + " : " + tracksJson[trackId].name + " (" + tracksJson[trackId].language + ")";
    }
    TST_STEP("Subtitles Available: " + subtitles_received_str);

    // Set the preferred Text Language, and then read back the properties to verify
    preferedSubtitlelanguage = "en";
    preferredTextLanguageJson = JSON.stringify({"languages": [preferedSubtitlelanguage]});
    aamp_player.player.setPreferredTextLanguage(preferredTextLanguageJson);

    preferredTextPropertiesStr = aamp_player.player.getPreferredTextProperties();
    preferredTextPropertiesJson = JSON.parse(preferredTextPropertiesStr);
    TST_STEP("preferredTextPropertiesStr: " + preferredTextPropertiesJson['preferred-text-languages']);
    TST_ASSERT ((preferedSubtitlelanguage == preferredTextPropertiesJson['preferred-text-languages']), ("Unexpected Preferred Text Property - Got: " + preferredTextPropertiesJson['preferred-text-languages'] + ", Expected: " + preferedSubtitlelanguage));

    // Start playback of the video
    await aamp_player.Play();
    await aamp_player.VerifyPlayback(3, 1);

    // For each expected Language - Set the subtitles and verify for 10s
    for (var trackId = 0; trackId < tracksJson.length; trackId++ )
    {
        // Sets Text Track and wait for Text Track Changed event.  N.B. Event is not generated first time when changing from invalid (-1)
        aamp_player.SetTextTrack(trackId, (trackId != 0));
        TST_STEP ("Text Track: " + trackId + " : " + tracksJson[trackId].name + " (" + tracksJson[trackId].language + ")");

        // Read back the text track ID, and verify it is as expected
        currentTrackId = aamp_player.player.getTextTrack();
        TST_ASSERT ((currentTrackId === trackId), ("Unexpected Text Track Id - Got: " + currentTrackId + ", Expected: " + trackId));

        // Read back the text track INFO, and verify it is as expected
        currentTrackInfoJson = JSON.parse(aamp_player.player.getTextTrackInfo());
        currentTrackInfo = currentTrackInfoJson[0];
        TST_ASSERT ((currentTrackInfo.language == expectSubtitleLanguages[trackId]), ("Unexpected Track Language - Got: " + currentTrackInfo.language + ", Expected: " + expectSubtitleLanguages[trackId]));
        TST_ASSERT ((currentTrackInfo.name == tracksJson[trackId].name), ("Unexpected Track Name - Got: " + currentTrackInfo.name + ", Expected: " + tracksJson[trackId].name));

        await aamp_player.VerifyPlayback(10, 1);
    }

    // Find the track ID for English subtitles and select
    trackId = tracksJson.findIndex(tr => { return tr.language === "en"; });
    aamp_player.SetTextTrack(trackId);
    TST_STEP ("Text Track: " + trackId + " : " + tracksJson[trackId].name + " (" + tracksJson[trackId].language + ")");
    await aamp_player.VerifyPlayback(5, 1);

    // Turn Subtitles OFF
    aamp_player.player.setClosedCaptionStatus(false);
    TST_STEP ("Subtitles OFF");
    await aamp_player.VerifyPlayback(10, 1);

    // Turn Subtitles ON
    aamp_player.player.setClosedCaptionStatus(true);
    TST_STEP ("Subtitles ON");
    await aamp_player.VerifyPlayback(10, 1);


    // Error Checking - Set Text Track to > max - Shouldn't change currently selected (en) -  No event Generated!
    invalidTrackId = tracksJson.length + 1;
    aamp_player.SetTextTrack(invalidTrackId, false);
    currentTrackId = aamp_player.player.getTextTrack();
    TST_ASSERT ((currentTrackId === trackId), ("Unexpected Text Track Id - Got: " + currentTrackId + ", Expected: " + trackId));

    currentTrackInfoJson = JSON.parse(aamp_player.player.getTextTrackInfo());
    currentTrackInfo = currentTrackInfoJson[0];
    TST_ASSERT ((currentTrackInfo.language == expectSubtitleLanguages[trackId]), ("Unexpected Track Language - Got: " + currentTrackInfo.language + ", Expected: " + expectSubtitleLanguages[trackId]));
    TST_ASSERT ((currentTrackInfo.name == tracksJson[trackId].name), ("Unexpected Track Name - Got: " + currentTrackInfo.name + ", Expected: " + tracksJson[trackId].name));


    // Seek back to position where known subtitles are displayed
    TST_STEP ("Subtitle Size Override Test");
    await aamp_player.Seek(positionStart, true);
    await aamp_player.VerifyPlayback(5, 1, false);


    // Loop through the pen size array setting and reading back each option
    for (var penSize = 0; penSize < penSizeOptions.length; penSize++)
    {
        ccOptionStr = JSON.stringify({"penSize" : penSizeOptions[penSize]});
        aamp_player.player.setTextStyleOptions(ccOptionStr);
        TST_STEP ("Set PenSize: " + penSize + " : (" + ccOptionStr + ")");

        // Read back the style options and verify they match as expected
        curretCcOption = JSON.parse(aamp_player.player.getTextStyleOptions());
        TST_ASSERT ((curretCcOption.penSize == penSizeOptions[penSize]), ("Unexpected Pen Size - Got: " + curretCcOption.penSize + ", Expected: " + penSizeOptions[penSize]));

        await aamp_player.VerifyPlayback(10, 1);
    }

    // Stop the playback and destroy the AAMP Player
    TST_STEP("Stop the playback");
    await aamp_player.Stop();
    aamp_player.destroy();
    TST_END()
}


// Run the test when the page loads
window.onload = function() {
    TST_2003_UVE_API_Subtitles()
}


</script>
<body>
    <div id="videoContainer">
        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
            <source src="dummy.mp4" type=video/ave> <!-- hole punching -->
        </video>
    </div>
    <div id="testModal">
        <p id="testData"></p>
    </div>
    <div id="infoModal">
        <p id="infoData"></p>
    </div>
</body>
</html>
