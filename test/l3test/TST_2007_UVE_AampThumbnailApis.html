<html>
<head>
    <meta charset="utf-8">
    <title>TST_2007_UVE_AampThumbnailApis</title>
    <link rel="stylesheet" href="TST_UVE_style.css">
    <script type="text/javascript" src="TST_UVE_utils.js" ></script>
</head>
<script>

// ------------------------------------------------------------------------------------
// Calls and verifies the UVE Thumbnails APIs
// ------------------------------------------------------------------------------------
// Playback of an asset which contains thumbnails.   Call the UVE APIs to allow
// selection and reading of the thumbnail track and verify that thumbnails can be
// retrieved.
// ------------------------------------------------------------------------------------

const ThumbnailUrl = "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel-tiled-thumbnails-timeline.ism/.mpd";

var initConfig = {
    // enable AAMP info logging, and turn on Gstreamer pipeline debug
    info: true,
    gst: true,

};

async function TST_2007_UVE_AampThumbnailApis() {
    TST_START("TST_2007_UVE_AampThumbnailApis");
    var aamp_player = new AAMPPlayer("MAIN-PLAYER");
    aamp_player.player.initConfig(initConfig);
    
    // Load and Play the Thumbnail URL, wait 10s and verify position updated
    TST_STEP("Tune to URL");
    await aamp_player.Load(ThumbnailUrl);
    await aamp_player.VerifyPlayback(5, 1);

    // gets the available thumbnail tracks
    TST_STEP("getAvailableThumbnailTracks");
    var InfoList = [];
    await aamp_player.getAvailableThumbnailTracks(InfoList);

    // get the manifest data
    TST_STEP("getManifest");
    await aamp_player.TST_GetManifest();
    await aamp_player.VerifyPlayback(5,1);

    // sets the thumbnail track based on index provided
    TST_STEP("setThumbnailTrack");
    await aamp_player.TST_SetThumbnailTrack(0);
    await aamp_player.VerifyPlayback(4,1);

    // gets the thumbnail data
    TST_STEP("getThumbnail");
    await aamp_player.TST_GetThumbnail(60,120);

    // gets the available audio bitrates
    TST_STEP("getAudioBitrates");
    await aamp_player.TST_GetAudioBitrates();

    // Stop the playback and destroy the AAMP Player
    TST_STEP("Stop the playback");
    await aamp_player.Stop();
    aamp_player.destroy();
    TST_END()
}


// Run the test when the page loads
    window.onload = function() {
    TST_2007_UVE_AampThumbnailApis()
}


</script>
<body>
    <div id="videoContainer">
        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
            <source src="dummy.mp4" type=video/ave> <!-- hole punching -->
        </video>
    </div>
    <div id="testModal">
        <p id="testData"></p>
    </div>
    <div id="infoModal">
        <p id="infoData"></p>
    </div>
</body>
</html>
