<html>
<head>
    <meta charset="utf-8">
    <title>TST_2000_UVE_AampPlayback</title>
    <link rel="stylesheet" href="TST_UVE_style.css">
    <script src="TST_UVE_utils.js"></script>
</head>
<script>

// ------------------------------------------------------------------------------------
// Basic playback of a video stream using AAMP.
// ------------------------------------------------------------------------------------
// Performs a selection of trick modes on the video stream, verifying expected response
// events are received and correct progress events are sent for a time after each step.
// ------------------------------------------------------------------------------------

var initConfig = {
    // enable AAMP info logging
    info: true,

    // Set progress reporting to 0.5 secs
    progressReportingInterval: 0.5
};


async function TST_2000_UVE_AampPlayback() {
    TST_START("TST_2000_UVE_AampPlayback");
    var aamp_player = new AAMPPlayer("MAIN-PLAYER");
    aamp_player.player.initConfig(initConfig);


    // Load and Play the main content URL, wait 10s and verify position updated
    TST_STEP("Tune to URL");
    await aamp_player.Load(mainContentUrl);
    await aamp_player.VerifyPlayback(10, 1);


    // Pause playback, wait 5s and verify the playback position doesn't move
    TST_STEP("Pause playback");
    await aamp_player.SetRate(0);
    await aamp_player.VerifyPlayback(5, 0);


    // Play, wait 5s and verify position updated
    TST_STEP("Set speed to 1x Playback");
    await aamp_player.SetRate(1);
    await aamp_player.VerifyPlayback(5, 1);


    // Set speed to 2x FF, wait 10s and verify position updated
    TST_STEP("Set speed to 2x FF");
    await aamp_player.SetRate(2);
    await aamp_player.VerifyPlayback(10, 2);


    // Set speed to 30x FF, wait 5s and verify position updated
    TST_STEP("Set speed to 30x FF");
    await aamp_player.SetRate(30);
    await aamp_player.VerifyPlayback(5, 30);


    // Set speed to 1x Playback, wait 10s and verify position updated
    TST_STEP("Set speed to 1x Playback");
    await aamp_player.SetRate(1);
    await aamp_player.VerifyPlayback(10, 1);


    // Seek to start Position (300s), wait 10s and verify position updated
    TST_STEP("Seek to start Position (300s)");
    await aamp_player.Seek(300);
    await aamp_player.VerifyPlayback(10, 1);


    // Set speed to -12x RR, wait 5s and verify position updated
    TST_STEP("Set speed to -12x RR");
    await aamp_player.SetRate(-12);
    await aamp_player.VerifyPlayback(5, -12);


    // Stop the playback and destroy the AAMP Player
    TST_STEP("Stop the playback");
    await aamp_player.Stop();
    aamp_player.destroy();
    TST_END()
}


// Run the test when the page loads
window.onload = function() {
    TST_2000_UVE_AampPlayback()
}


</script>
<body>
    <div id="videoContainer">
        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
            <source src="dummy.mp4" type=video/ave> <!-- hole punching -->
        </video>
        <video id="dummyVideo" autoplay="autoplay" style="position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;">
            <source src="rec://srv/cur" type="video/x-dvb"/>
        </video>
    </div>
    <div id="testModal">
        <p id="testData"></p>
    </div>
    <div id="infoModal">
        <p id="infoData"></p>
    </div>
</body>
</html>
