<html>
<head>
    <meta charset="utf-8">
    <title>TST_2006_UVE_AampAudVidPlayback</title>
    <link rel="stylesheet" href="TST_UVE_style.css">
    <script type="text/javascript" src="TST_UVE_utils.js" ></script>
    <script type="text/javascript" src="TST_2006_UVE_AampAudVidPlayback.js" ></script>
</head>
<script>

// ------------------------------------------------------------------------------------
// Plays video stream and verify various Audio and Video related UVE APIs
// ------------------------------------------------------------------------------------
// This test calls and verifies the UVE subtitle related APIs
//    -initConfig
//    -setVideoMute
//    -setVolume
//    -getVolume
//    -setAudioLanguage
//    -setPreferredAudioLanguage
//    -getVideoBitrates
//    -getDurationSec
// ------------------------------------------------------------------------------------

async function TST_2006_UVE_AampAudVidPlayback() {
    TST_START("TST_2006_UVE_AampAudVidPlayback");
    var aamp_player = new AAMPPlayer2("MAIN-PLAYER");

    // Initialise the config
    TST_STEP("initConfig");
    var playerInitConfig = {info: true,gst: true,initialBitrate: 2500000,offset: 0,networkTimeout: 10,preferredAudioLanguage: "spa"};
    await aamp_player.player.initConfig(playerInitConfig);

    // Subscribe to specific tags / metadata in manifest
    TST_STEP("TST_SetSubscribedTags");
    let tags = ["#EXT-X-TARGETDURATION","#EXT-X-MAP", "#EXT-X-DISCONTINUITY","#EXT-X-KEY"];
    await aamp_player.TST_SetSubscribedTags(tags);

    // Load and Play the main content URL, wait 10s and verify position updated
    TST_STEP("Tune to URL");
    await aamp_player.Load(TST_2006_url);
    await aamp_player.VerifyPlayback(10, 1);

    // mute the video
    TST_STEP("mute video");
    await aamp_player.player.setVideoMute(true);
    await aamp_player.VerifyPlayback(10, 1);

    // unmute the video
    TST_STEP("unmute video");
    await aamp_player.player.setVideoMute(false);
    await aamp_player.VerifyPlayback(10, 1);

    // sets the audio language
    TST_STEP("setAudioLanguage");
    let TrackList = await aamp_player.TST_GetAudioTrackInfo();
    TST_ASSERT(TrackList[0].language == "spa", "Language should be 'spa'");
    await aamp_player.player.setAudioLanguage("eng");
    TrackList = await aamp_player.TST_GetAudioTrackInfo();
    TST_ASSERT(TrackList[0].language == "eng", "Language should be 'eng'");
    await aamp_player.VerifyPlayback(4,1);

    // sets the preferred audio language
    TST_STEP("setPreferredAudioLanguage");
    let preferredAudioProperties = await aamp_player.TST_GetPreferredAudioProperties();
    TST_ASSERT(preferredAudioProperties["preferred-audio-languages"] == "eng","Language should be 'eng'");
    await aamp_player.player.setPreferredAudioLanguage("ger","alternate");
    preferredAudioProperties = await aamp_player.TST_GetPreferredAudioProperties();
    TST_ASSERT(preferredAudioProperties["preferred-audio-languages"] == "ger","Language should be 'ger'");
    await aamp_player.VerifyPlayback(4,1);

    // sets the auxiliary language
    TST_STEP("setAuxiliaryLanguage");
    await aamp_player.player.setAuxiliaryLanguage("it");

    // sets the preferred audio codec
    TST_STEP("setPreferredAudioCodec");
    await aamp_player.player.setPreferredAudioCodec("mp4a.40.2");

    // Get the available bit rates
    TST_STEP("getVideoBitrates");
    let Bitrates = await aamp_player.TST_GetVideoBitrates();
    TST_ASSERT(Bitrates.includes(800000), "avlBitrates should contain 800000");
    TST_ASSERT(Bitrates.includes(1400000), "avlBitrates should contain 1400000");
    TST_ASSERT(Bitrates.includes(2800000), "avlBitrates should contain 2800000");

    // gets the duration of content in seconds
    TST_STEP("getDurationSec");
    dur = await aamp_player.TST_GetDurationSec();
    TST_ASSERT(dur == 900, "Duration should be 900 seconds");

    // To check whether volume set properly or not
    TST_STEP("check audio volume");
    await aamp_player.TST_CheckSetAudioVolume();
    await aamp_player.VerifyPlayback(10, 1);

    // To check available audio tracks are properly retrieved or not
    TST_STEP("checkAvailableAudioTracks")
    await aamp_player.TST_CheckAvailableAudioTracks();
    await aamp_player.VerifyPlayback(10,1);

    // To check audio track set correctly or not
    TST_STEP("checkSetAudioTrack");
    await aamp_player.TST_CheckSetAudioTrack("spa","mp4a.40.2","mono","true");
    await aamp_player.VerifyPlayback(10,1);

    // Stop the playback and destroy the AAMP Player
    TST_STEP("Stop the playback");
    await aamp_player.Stop();
    aamp_player.destroy();
    TST_END()
}


    // Run the test when the page loads
    window.onload = function() {
    TST_2006_UVE_AampAudVidPlayback()
}


</script>
<body>
    <div id="videoContainer">
        <video style="height:100%; width:100%; position:absolute; bottom:0; left:0">
            <source src="dummy.mp4" type=video/ave> <!-- hole punching -->
        </video>
    </div>
    <div id="testModal">
        <p id="testData"></p>
    </div>
    <div id="infoModal">
        <p id="infoData"></p>
    </div>
</body>
</html>
